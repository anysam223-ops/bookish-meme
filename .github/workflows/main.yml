name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract and Fix Project
        run: |
          unzip -o SCEditorAndroid.zip -d temp_folder
          # Localiza a pasta raiz onde está o código (procura pelo arquivo build.gradle)
          ROOT_DIR=$(find temp_folder -name "build.gradle*" -exec dirname {} \; | head -n 1)
          
          if [ -z "$ROOT_DIR" ]; then
            echo "ERRO: build.gradle não encontrado no ZIP!"
            exit 1
          fi
          
          # Move tudo para a raiz do repositório
          cp -rn "$ROOT_DIR"/* .
          
          # Se o gradlew não existir, o GitHub vai criar um wrapper básico
          if [ ! -f "gradlew" ]; then
            echo "Gradlew faltando! Tentando gerar um..."
            gradle wrapper --gradle-version 8.7
          fi
          
          chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sc-editor-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            */build/outputs/apk/debug/*.apk
